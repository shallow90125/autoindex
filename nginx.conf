server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # テーマファイルを配信
    location /_theme/ {
        alias /etc/nginx/theme/;
    }

    location / {
        autoindex on;
        autoindex_exact_size off;
        autoindex_localtime on;

        # sub_filter はgzip圧縮済みレスポンスには効かないため無効化
        gzip off;

        # autoindex が生成した HTML にテーマを注入
        sub_filter '<head>'  '<head><meta charset="UTF-8"><link rel="stylesheet" href="/_theme/style.css">';
        sub_filter '</body>' '<script src="/_theme/main.js"></script></body>';
        sub_filter_once off;

        if (-f $request_filename) {
            add_header Content-Disposition 'attachment';
        }
    }
}
